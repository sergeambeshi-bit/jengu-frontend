<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jengu Album</title>
    <!-- Link your CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="nav-bar">
        <div class="text-jengu font-bold text-xl">JENGU</div>
    </nav>

    <!-- Main Content -->
    <div class="main-content text-center p-10">
        <h1 class="text-3xl font-bold mb-4">Get the Album</h1>
        <div class="album-art mb-6" style="border: 4px solid #01d4ab; width: 200px; height: 200px; margin: 0 auto;">
            <!-- Album Cover -->
        </div>

        <div id="payment-section">
            <p class="mb-4">Price: 5000 XAF</p>
            <input type="text" id="phone" placeholder="Mobile Money Number" class="border p-2 mb-2"><br>
            <button onclick="payWithNokash()" class="btn-primary">Pay with Mobile Money</button>
            <div class="mt-4">
                <a href="#" class="text-jengu underline">Or pay with Card</a>
            </div>
        </div>
    </div>

    <!-- Link JS files at the end of body -->
    <script src="js/device.js" defer></script>
    <script src="js/script.js" defer></script>
</body>
</html>
